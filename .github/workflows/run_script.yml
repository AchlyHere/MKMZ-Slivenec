name: Run script

on:
  schedule:
    - cron: '0 0 * * *' # Run once a day at midnight
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Enable debug logging
        run: |
          echo "##[debug]Debugging is enabled."

      - name: Run the script
        run: python ask_chatgpt_about_events.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Check for changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add events.json last_run.txt
          git diff --cached --quiet || git commit -m 'Update events.json and last_run.txt'
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GITHUB }}