name: Verify GitHub Token

on: 
  push:
    branches: 
      - main

jobs:
  verify-token:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify GITHUB_TOKEN
        run: |
          echo "GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}"
