</head>
<body>
    <div class="container">
        <div class="left-section">
            <img src="IMG_0488.JPEG" alt="MKMŽ Slivenec Logo">
            <p class="title">MKMŽ Slivenec</p>
            <nav class="navigation">
                <ul><li><a href="index.html">Úvod</a></li>
                    <li><a href="o_nas.html">O nás</a></li>
                    <li><a href="co_je_modulove_kolejiste.html">Co je modulové kolejiště?</a></li>
                    <li><a href="jak_stavime.html">Jak stavíme</a></li>
                    <li><a href="jak_jezdime.html">Jak jezdíme</a></li>
                    <li><a href="schuzky.html">Schůzky</a></li>

                    <li><a href="Kalendář železničních akcí.html">Kalendář železničních akcí</a></li>
                </ul>
            </nav>
            <div class="contact-info">
                <p>Kontakt:</p>
                <p>nadrazislivenec@seznam.cz</p>
            </div>
            <footer>
                <p>&copy; 2024 MKMŽ Slivenec</p>
                <p class="license">Tento projekt je licencován pod licencí <a href="https://example.com/license" target="_blank">MIT</a>.</p>
            </footer>
        </div>
        <div class="right-section">
            <h1>Nejbližší schůzky kroužku</h1>
            <div id="meetings-container">
                <!-- Meetings will be dynamically inserted here -->
            </div>
        </div>
    </div>

    <script>
        async function loadMeetings() {
            try {
                const response = await fetch('meetings.json');
                const data = await response.json();
                const meetings = data.schuzky;

                const meetingsContainer = document.getElementById('meetings-container');
                meetings.forEach(meeting => {
                    const meetingElement = document.createElement('div');
                    meetingElement.classList.add('meeting');

                    meetingElement.innerHTML = `
                        <h2>${meeting.misto}</h2>
                        <p>Nejbližší schůzka: ${meeting.datum} v ${meeting.cas}</p>
                    `;

                    meetingsContainer.appendChild(meetingElement);
                });
            } catch (error) {
                console.error('Error loading meetings:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadMeetings);
    </script>
</body>
</html>
